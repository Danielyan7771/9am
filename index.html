<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bundled Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1714; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #1a1714; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
    /* Стили для переключателя языка */
    #lang-switcher {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10001;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: flex;
      gap: 6px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }
    #lang-switcher button {
      background: transparent;
      border: 1px solid #ccc;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      color: #333;
      transition: all 0.2s;
    }
    #lang-switcher button:hover {
      background: #e0e0e0;
    }
    #lang-switcher button.active {
      background: #1a1714;
      color: #fff;
      border-color: #1a1714;
    }
  </style>
  <noscript>
    <style>#__bundler_loading { display: none; }</style>
    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">
      This page requires JavaScript to display.
    </div>
  </noscript>
</head>
<body>
  <!-- Переключатель языка -->
  <div id="lang-switcher">
    <button data-lang="en" class="active">ENG</button>
    <button data-lang="ru">RUS</button>
    <button data-lang="hy">ARM</button>
  </div>

  <div id="__bundler_thumbnail">
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="800" fill="#1a1714"></rect>
<rect x="470" y="250" width="260" height="260" rx="60" fill="#f4eee4"></rect>
<text x="600" y="435" font-family="Georgia, serif" font-size="180" fill="#1c1a17" text-anchor="middle">9</text>
<text x="600" y="495" font-family="Arial, sans-serif" font-size="42" letter-spacing="14" fill="#5f8a80" text-anchor="middle">AM</text>
</svg>
</div>
  <div id="__bundler_loading" data-i18n="[text]Unpacking...">Unpacking...</div>

  <script>
    // --- Добавлен код для переключения языка ---
    (function() {
      // Словарь переводов для статических текстов
      const translations = {
        en: {
          "Unpacking...": "Unpacking...",
        },
        ru: {
          "Unpacking...": "Распаковка...",
        },
        hy: {
          "Unpacking...": "Բացում...",
        }
      };

      // Сохраняем выбранный язык
      let currentLang = localStorage.getItem('preferredLang') || 'en';

      // Функция обновления текстов на странице
      function applyLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('preferredLang', lang);

        // Обновляем все элементы с атрибутом data-i18n
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const attr = el.getAttribute('data-i18n');
          // Формат: "[attr]key" или просто "key"
          let parts = attr.split(']');
          let key, targetAttr;
          if (parts.length === 2) {
            targetAttr = parts[0].replace('[', '');
            key = parts[1];
          } else {
            targetAttr = 'textContent';
            key = parts[0];
          }

          const translation = translations[lang] && translations[lang][key];
          if (translation !== undefined) {
            if (targetAttr === 'textContent') {
              el.textContent = translation;
            } else {
              el.setAttribute(targetAttr, translation);
            }
          }
        });

        // Обновляем активную кнопку
        document.querySelectorAll('#lang-switcher button').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.lang === lang);
        });
      }

      // Инициализация при загрузке
      document.addEventListener('DOMContentLoaded', function() {
        // Устанавливаем язык по умолчанию
        applyLanguage(currentLang);

        // Обработчики на кнопки
        document.querySelectorAll('#lang-switcher button').forEach(btn => {
          btn.addEventListener('click', function() {
            applyLanguage(this.dataset.lang);
          });
        });
      });
    })();

    // --- Оригинальный скрипт распаковки (без изменений) ---
    document.addEventListener('DOMContentLoaded', async function() {
      const loading = document.getElementById('__bundler_loading');
      function setStatus(msg) { if (loading) loading.textContent = msg; }

      // ... (остальной код остаётся без изменений)
    });
  </script>

  <!-- Оригинальный скрипт с манифестом и шаблоном (оставлен без изменений) -->
  <script type="__bundler/manifest">
    ... (ваш оригинальный манифест) ...
  </script>
  <script type="__bundler/template">
    ... (ваш оригинальный шаблон) ...
  </script>
  <script type="__bundler/ext_resources">
    ... (ваши оригинальные внешние ресурсы) ...
  </script>
</body>
</html>
